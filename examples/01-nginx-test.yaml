# =====================================================
# Nginx 测试应用 - 完整配置
# 用途：测试 K8s 插件功能
# 命名空间：development
# =====================================================

---
# 创建命名空间
apiVersion: v1
kind: Namespace
metadata:
  name: development
  labels:
    environment: development
    managed-by: openclaw

---
# ConfigMap - 存储 Nginx 配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: development
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <title>OpenClaw K8s Test</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }
            .container {
                text-align: center;
                background: rgba(255,255,255,0.1);
                padding: 40px;
                border-radius: 10px;
                backdrop-filter: blur(10px);
            }
            h1 { font-size: 3em; margin: 0; }
            p { font-size: 1.2em; }
            .info {
                margin-top: 20px;
                font-size: 0.9em;
                opacity: 0.8;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>🚀 OpenClaw K8s</h1>
            <p>Nginx 测试应用运行中</p>
            <div class="info">
                <p>Hostname: <span id="hostname"></span></p>
                <p>Environment: Development</p>
            </div>
        </div>
        <script>
            fetch('/api/hostname')
                .then(r => r.text())
                .then(h => document.getElementById('hostname').textContent = h)
                .catch(() => document.getElementById('hostname').textContent = window.location.hostname);
        </script>
    </body>
    </html>

---
# Deployment - Nginx 应用
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-test
  namespace: development
  labels:
    app: nginx-test
    version: v1.0
  annotations:
    kubernetes.io/change-cause: "Initial deployment - OpenClaw test app"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: nginx-test
  template:
    metadata:
      labels:
        app: nginx-test
        version: v1.0
    spec:
      containers:
      - name: nginx
        image: nginx:1.21
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        volumeMounts:
        - name: nginx-config
          mountPath: /usr/share/nginx/html
          readOnly: true
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config

---
# Service - ClusterIP
apiVersion: v1
kind: Service
metadata:
  name: nginx-test
  namespace: development
  labels:
    app: nginx-test
spec:
  type: ClusterIP
  selector:
    app: nginx-test
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP

---
# Service - NodePort（可选，用于外部访问）
apiVersion: v1
kind: Service
metadata:
  name: nginx-test-nodeport
  namespace: development
  labels:
    app: nginx-test
spec:
  type: NodePort
  selector:
    app: nginx-test
  ports:
  - name: http
    port: 80
    targetPort: http
    nodePort: 30080
    protocol: TCP
